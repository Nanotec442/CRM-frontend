version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: Cross-Origin-Opener-Policy
          value: same-origin-allow-popups
redirects:
  - source: '</^[^.]+$/>'
    target: /index.html
    status: '200'